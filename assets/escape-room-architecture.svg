<svg xmlns="http://www.w3.org/2000/svg" width="680" height="350" viewBox="0 0 680 350" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif" role="img">
<title>Escape Room MCP architecture</title>
<desc>Claude, acting as the MCP client, calls a single Apex-hosted EscapeRoom MCP server that exposes seven single-object tools. The server is stateless; an encrypted systemState token is threaded back to the client on every call.</desc>
<defs>
<marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#888780" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<rect x="0" y="0" width="680" height="350" fill="#FAFAF7"/>

<rect x="40" y="150" width="150" height="80" rx="12" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.5"/>
<text x="115" y="182" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="500" fill="#085041">Claude</text>
<text x="115" y="203" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="400" fill="#0F6E56">MCP client</text>

<line x1="192" y1="178" x2="256" y2="178" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="256" y1="210" x2="192" y2="210" stroke="#888780" stroke-width="1.5" marker-end="url(#arrow)"/>
<text x="224" y="230" text-anchor="middle" font-size="12" font-weight="400" fill="#5F5E5A">encrypted</text>
<text x="224" y="246" text-anchor="middle" font-size="12" font-weight="400" fill="#5F5E5A">state &#8635;</text>

<rect x="260" y="40" width="380" height="270" rx="20" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.5"/>
<text x="280" y="70" font-size="14" font-weight="500" fill="#3C3489">EscapeRoom MCP server</text>
<text x="280" y="90" font-size="12" font-weight="400" fill="#534AB7">one Apex endpoint &#183; stateless</text>

<rect x="280" y="104" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="360" y="122" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Room</text>
<rect x="460" y="104" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="540" y="122" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Door</text>
<rect x="280" y="152" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="360" y="170" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Key</text>
<rect x="460" y="152" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="540" y="170" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Balloon</text>
<rect x="280" y="200" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="360" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Tennis ball</text>
<rect x="460" y="200" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="540" y="218" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Letter opener</text>
<rect x="370" y="248" width="160" height="36" rx="8" fill="#FFFFFF" stroke="#B4B2A9" stroke-width="0.5"/>
<text x="450" y="266" text-anchor="middle" dominant-baseline="central" font-size="14" font-weight="400" fill="#2C2C2A">Velvet box</text>
</svg>
